<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay Bhavani Stationery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Poppins',sans-serif;background:#f9f9f9;}
header{background:#ff7a00;color:#fff;padding:15px;text-align:center;font-size:22px;font-weight:600;}
.hero{background:linear-gradient(135deg,#ff7a00,#ffb347);color:#fff;text-align:center;padding:50px;}
.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px;}
.card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.2);transition:0.3s;}
.card:hover{transform:scale(1.05);}
.card img{width:100%;height:150px;object-fit:cover;border-radius:8px;}
.btn{background:#ff7a00;color:white;padding:8px;border:none;border-radius:5px;cursor:pointer;margin-top:8px;}
.search{padding:10px;text-align:center;}
.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;padding:12px;border-radius:50px;text-decoration:none;}
</style>
</head>

<body>

<header>Jay Bhavani Stationery</header>

<div class="hero">
<h1>Your One-Stop Shop for Creativity, Study & Office Needs</h1>
<p>Serving Ghuma-Bopal Road, Ahmedabad</p>
<p><b>📞 Contact: +91 99999 99999</b></p>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search products..." oninput="displayProducts()">
</div>
<input type="text" id="name" placeholder="Product Name">
<input type="number" id="price" placeholder="Price">
<input type="text" id="category" placeholder="Category">
<input type="file" id="image">
<button onclick="addProduct()" class="btn">Add Product</button>
<div class="products" id="productList"></div>

<a class="whatsapp" href="https://wa.me/919999999999" target="_blank">Chat</a>
let isOwner = false;

// change to true only when YOU want to edit
<script>

let defaultProducts = [
{name:"Notebook",price:50,category:"Notebook",image:"https://images.unsplash.com/photo-1519681393784-d120267933ba?w=500"},
{name:"Ball Pen",price:10,category:"Pen",image:"https://images.unsplash.com/photo-1583485088034-697b5bc54ccd?w=500"},
{name:"Pencil Box",price:80,category:"School",image:"https://images.unsplash.com/photo-1603575449293-0f38c64c6b35?w=500"},
{name:"Geometry Box",price:150,category:"School",image:"https://images.unsplash.com/photo-1588072432836-e10032774350?w=500"},
{name:"Highlighter",price:30,category:"Pen",image:"https://images.unsplash.com/photo-1586953208448-b95a79798f07?w=500"},
{name:"Sketch Pens",price:120,category:"Art",image:"https://images.unsplash.com/photo-1581093588401-16ec6d1b7b6b?w=500"}
];

let products = JSON.parse(localStorage.getItem('products')) || defaultProducts;

function displayProducts(){
let list=document.getElementById('productList');
let search=document.getElementById('search').value.toLowerCase();
list.innerHTML='';

products.forEach((p,i)=>{
if(p.name.toLowerCase().includes(search)){
let msg=`I want to order ${p.name} for ₹${p.price}`;
list.innerHTML+=`
<div class="card">
<img src="${p.image}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<p>${p.category}</p>
${isOwner ? `<button class="btn" onclick="removeProduct(${i})">Remove</button>` : ""}
<button class="btn" onclick="orderProduct('${p.name}',${p.price})">Order</button>
</div>`;
}
});
}

function addProduct(){
let name=document.getElementById('name').value;
let price=document.getElementById('price').value;
let category=document.getElementById('category').value;
let file=document.getElementById('image').files[0];

if(!name||!price||!category||!file){alert('Fill all fields');return;}

let reader=new FileReader();
reader.onload=function(e){
products.push({name,price,category,image:e.target.result});
localStorage.setItem('products',JSON.stringify(products));
displayProducts();
}
reader.readAsDataURL(file);

document.getElementById('name').value='';
document.getElementById('price').value='';
document.getElementById('category').value='';
document.getElementById('image').value='';
}

function removeProduct(i){
products.splice(i,1);
localStorage.setItem('products',JSON.stringify(products));
displayProducts();
}

function orderProduct(name,price){
let msg=`I want to order ${name} for ₹${price}`;
window.open('https://wa.me/919999999999?text='+encodeURIComponent(msg));
}

displayProducts();

  </script>

</body>
</html>
