<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jay Bhavani Stationery</title><style>
  body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(to right,#fff7f0,#ffe4cc);} 
  header{background:linear-gradient(135deg,#ff7a00,#ffb347);color:white;padding:25px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.2);} 
  nav{display:flex;justify-content:center;gap:25px;background:#222;padding:12px;} 
  nav a{color:white;text-decoration:none;font-weight:bold;} 
  section{padding:30px;text-align:center;} 
  .hero{font-size:20px;font-weight:bold;animation:fadeIn 2s;} 

  @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }

  input,select{padding:8px;margin:5px;border-radius:5px;border:1px solid #ccc;} 

  .products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;} 
  .card{background:white;border-radius:15px;padding:15px;box-shadow:0 5px 15px rgba(0,0,0,0.15);transition:0.3s;} 
  .card:hover{transform:scale(1.05);} 
  .card img{width:100%;height:160px;object-fit:cover;border-radius:10px;} 

  .btn{background:#ff7a00;color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;margin:5px;} 

  footer{background:#222;color:white;text-align:center;padding:15px;} 

  .whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:12px 15px;border-radius:50px;text-decoration:none;font-weight:bold;box-shadow:0 4px 10px rgba(0,0,0,0.3);} 
</style></head><body><header>
  <h1>Jay Bhavani Stationery</h1>
  <p>Serving Ghuma-Bopal Road, Ahmedabad</p>
</header><nav>
  <a href="#home">Home</a>
  <a href="#products">Products</a>
</nav><section id="home">
  <p class="hero">✨ Your One-Stop Shop for Creativity, Study & Office Needs ✨</p>
  <p>Premium quality stationery at affordable prices.</p>
  <p><b>📞 Contact: +91 99999 99999</b></p>
</section><section id="products">
  <h2>Manage Products</h2>  <input type="text" id="name" placeholder="Product Name">
  <input type="number" id="price" placeholder="Price">
  <input type="text" id="category" placeholder="Category (e.g. Pen, Notebook)">
  <input type="file" id="image" accept="image/*">
  <button class="btn" onclick="addProduct()">Add Product</button>  <div>
    <input type="text" id="search" placeholder="Search" oninput="displayProducts()">
    <select id="filter" onchange="displayProducts()">
      <option value="">All Categories</option>
    </select>
  </div>  <h2>Our Products</h2>
  <div class="products" id="productList"></div>
</section><footer>
  <p>© 2026 Jay Bhavani Stationery</p>
</footer><a class="whatsapp" href="https://wa.me/919999999999" target="_blank">Chat</a>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];

function updateCategories(){
  const filter = document.getElementById('filter');
  let categories = [...new Set(products.map(p=>p.category))];
  filter.innerHTML = '<option value="">All Categories</option>';
  categories.forEach(c=>{
    filter.innerHTML += `<option value="${c}">${c}</option>`;
  });
}

function displayProducts(){
  const list = document.getElementById('productList');
  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter').value;
  list.innerHTML = '';

  products.forEach((p,i)=>{
    if(p.name.toLowerCase().includes(search) && (filter==='' || p.category===filter)){
      let msg = `I want to order ${p.name} for ₹${p.price}`;
      list.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <p>₹${p.price}</p>
        <p>${p.category}</p>
        <button class="btn" onclick="removeProduct(${i})">Remove</button>
        <a class="btn" href="https://wa.me/919999999999?text=${encodeURIComponent(msg)}" target="_blank">Order</a>
      </div>`;
    }
  });
}

function addProduct(){
  const name = document.getElementById('name').value;
  const price = document.getElementById('price').value;
  const category = document.getElementById('category').value;
  const file = document.getElementById('image').files[0];

  if(!name||!price||!category||!file){alert('Fill all');return;}

  const reader = new FileReader();
  reader.onload = function(e){
    products.push({name,price,category,image:e.target.result});
    localStorage.setItem('products',JSON.stringify(products));
    updateCategories();
    displayProducts();
  }
  reader.readAsDataURL(file);

  document.getElementById('name').value='';
  document.getElementById('price').value='';
  document.getElementById('category').value='';
  document.getElementById('image').value='';
}

function removeProduct(i){
  products.splice(i,1);
  localStorage.setItem('products',JSON.stringify(products));
  updateCategories();
  displayProducts();
}

updateCategories();
displayProducts();
</script></body>
</html>
